<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./css/style.css" rel="stylesheet" type="text/css" />
    <title>Sharan Sharma</title>
  </head>
  <body>
    <div class="portfolio">
      <header>
        <nav>
          <h3 class="logo">Sharan Sharma</h3>
          <img src="images/hamburger.svg" alt="Menu" />
        </nav>
      </header>

      <main>
        <section class="page programmer">
          <div class="details">
            <h1>Sharan Sharma</h1>
            <h2>Developer</h2>
            <p>13/02/1994</p>
          </div>

          <div class="hero">
            <img class="model model-left" src="./images/left1.jpg" alt="" />
            <img class="model model-right" src="./images/right1.jpg" alt="" />
          </div>
        </section>

        <div class="pages">
          <div class="page-1">
            <h3>01</h3>
            <svg
              class="slide active"
              width="12"
              height="12"
              viewBox="0 0 12 12"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="6" cy="6" r="6" fill="white" />
            </svg>
          </div>
          <div class="page-2">
            <h3>02</h3>
            <svg
              class="slide"
              width="12"
              height="12"
              viewBox="0 0 12 12"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle cx="6" cy="6" r="6" fill="white" />
            </svg>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
